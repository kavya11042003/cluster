apiVersion: apps/v1
kind: Deployment1
metadata:
  name: fitness
  labels:
    first: app
spec:
  replicas: 2
  selector:
    matchLabels: 
      app: web
  template:
    metadata:
      labels:
        app: web
    spec:
      containers:
        - name: fitness-container
          image: manubolukavya11/loc:v1.0.0
          ports:
            - containerPort: 5000
---
apiVersion: v1
kind: Service
metadata: 
  name: fitness-service
spec:
  selector:
    app: web
  ports:
    - protocol: TCP
      port: 5002
      targetPort: 5000
  type: ClusterIP