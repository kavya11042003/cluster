apiVersion: apps/v1
kind: Deployment

metadata:
  name: nginx-deployment
  labels:
    first: app

spec:   # Behaviour of Deployment
  replicas: 3

  selector:
    matchLabels:
      app: web

  template:
    metadata:
      labels:
        app: web

    spec:   # Behaviour of Pod
      containers:
        - name: aditya-container
          image: nginx

          ports:
            - containerPort: 80
---
apiVersion: v1
kind: Service

metadata:
  name: my-service

spec:
  selector:
    app: web

  ports:
    - protocol: TCP
      port: 85
      targetPort: 80

  type: ClusterIP